# Asset-Vision configuration
# Edit these values to match your setup before running.

camera:
  # ── Source selector ──────────────────────────────────────────────────────
  # Choose one: sample | usb | integrated | ipcam
  # See docs/CAMERA_SOURCES.md for tradeoffs (latency, WSL2 support, risk).
  source: sample          # "sample" works with NO hardware — great for first run

  # ── Sample source (used when source: sample) ─────────────────────────────
  samples_dir: "samples"  # folder of JPG/PNG images to loop

  # ── USB / integrated webcam (used when source: usb or integrated) ─────────
  # index: 0              # camera device index (0 = first camera)
  # WSL2 users: USB passthrough via usbipd-win required — see CAMERA_SOURCES.md

  # ── IP Camera / phone (used when source: ipcam) ───────────────────────────
  # url: "http://192.168.1.100:8080/video"   # replace with your phone's IP
  # shot_url: "http://192.168.1.100:8080/shot.jpg"
  # reconnect_delay: 3     # seconds between reconnect attempts

  # ── Shared settings ────────────────────────────────────────────────────────
  target_fps: 5          # frames per second to process (keep low on CPU-only)
  width: 640             # resize width (height auto-scaled)

detection:
  model: "yolov8n.pt"    # auto-downloaded on first run; gitignored
  confidence: 0.45       # minimum confidence threshold
  device: "cpu"          # cpu only (no CUDA on this machine)

qr:
  prefix: "AV-"          # asset ID prefix, e.g. AV-0001
  label_size_mm: 35      # printed QR label size

storage:
  db_path: "data/assets.db"
  frames_dir: "data/frames"
  presence_window_sec: 300   # seconds until an asset flips to "missing"

web:
  host: "127.0.0.1"      # localhost only (safe default). Set "0.0.0.0" to expose
                         # the dashboard to other devices on your LAN — only do this
                         # on a trusted network; there is no authentication.
  port: 8100
  stream_fps: 10          # annotated MJPEG stream FPS to browser
