# Asset-Vision CI — lint (ruff) + pytest
#
# Runs on every push and pull-request to master.
# Uses requirements-ci.txt (no torch/ultralytics) so CI completes in ~60 s.
# Tests cover store.py (CRUD, presence logic) and qrtools.py (QR round-trip,
# IoU association) — pure Python, no camera or GPU required.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Run ruff
        run: ruff check asset_vision/ tests/ web/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install system packages (libzbar0 for pyzbar)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libzbar0

      - name: Install Python dependencies (CI subset — no torch)
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e . --no-deps   # make asset_vision importable without heavy deps

      - name: Run pytest
        run: pytest tests/ -v --tb=short
